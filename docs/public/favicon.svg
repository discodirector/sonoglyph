<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sonoglyph favicon — see web/public/favicon.svg for the full
       design rationale. Kept identical between docs.sonoglyph.xyz and
       sonoglyph.xyz so the two tabs read as a pair when both are
       open. Adapts to UA chrome via prefers-color-scheme. -->
  <g>
    <rect x="9" y="4" width="2" height="24" />
    <rect x="11" y="8" width="10" height="2" />
    <rect x="11" y="14" width="16" height="2" />
    <rect x="11" y="20" width="6" height="2" />
  </g>
  <style>
    rect { fill: #050507; }
    @media (prefers-color-scheme: dark) {
      rect { fill: #d8d4cf; }
    }
  </style>
</svg>
