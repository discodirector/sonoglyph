<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Sonoglyph favicon — a tiny abstract of the game itself:

      |═══════
      |══════════════
      |═════
      |
      ↓ (descent)

    A vertical descent column with three horizontal layer-marks of
    varying widths anchored to it. The same shape the player builds
    over 15 turns, compressed to the 16×16 favicon scale. Each
    rectangle is at least 2 px high so it survives downsampling on
    HiDPI tabs.

    Colour adapts to the user-agent chrome: near-black by default
    (Chrome's default light tab strip), off-white via
    prefers-color-scheme: dark (Safari/Firefox dark mode, Edge
    dark mode, etc.). Same approach as Starlight's stock favicon.
  -->
  <g>
    <!-- descent column — the constant the layers hang off -->
    <rect x="9" y="4" width="2" height="24" />
    <!-- three layer marks: short / long / medium-short, mirroring the
         visual rhythm of an actual Sonoglyph glyph -->
    <rect x="11" y="8" width="10" height="2" />
    <rect x="11" y="14" width="16" height="2" />
    <rect x="11" y="20" width="6" height="2" />
  </g>
  <style>
    rect { fill: #050507; }
    @media (prefers-color-scheme: dark) {
      rect { fill: #d8d4cf; }
    }
  </style>
</svg>
