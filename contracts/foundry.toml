[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
# Cancun is fine on Monad testnet (it tracks recent EVM versions).
evm_version = "cancun"
# Auto-detect remappings from lib/ but also let remappings.txt override.
auto_detect_remappings = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[rpc_endpoints]
monad_testnet = "${MONAD_RPC_URL}"

[etherscan]
# Monad's block explorer integrates with Sourcify, not Etherscan classic.
# Verification flow: `forge verify-contract --verifier sourcify ...`
